<html lang="ja">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSHINAVI - ライブイベント情報まとめ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #e040fb;
      --accent2: #00e5ff;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --text: #f0f0f0;
      --text-muted: #888;
      --border: #2a2a2a;
      --red: #ff5252;
      --orange: #ffab40;
      --green: #69f0ae;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo img {
      height: 48px;
      width: auto;
      display: block;
      -webkit-text-fill-color: initial;
    }

    nav { display: flex; gap: 24px; }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }

    /* ── ヒーロー ── */
    .hero {
      text-align: center;
      padding: 56px 24px 40px;
      border-bottom: 1px solid var(--border);
      background: radial-gradient(ellipse at 50% 0%, rgba(224,64,251,0.08) 0%, transparent 70%);
    }

    .hero h1 {
      font-size: clamp(24px, 5vw, 44px);
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .hero h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* ── 検索 & フィルターバー ── */
    .controls {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .search-wrap {
      position: relative;
      max-width: 480px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 15px;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px 10px 38px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    #searchInput::placeholder { color: var(--text-muted); }
    #searchInput:focus { border-color: var(--accent); }

    #searchSuggest {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--bg3);
      border: 1px solid var(--accent);
      border-radius: 8px;
      overflow: hidden;
      z-index: 100;
      max-height: 240px;
      overflow-y: auto;
    }
    #searchSuggest.open { display: block; }
    .suggest-item {
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover { background: var(--bg2); }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-right: 4px;
    }

    .filter-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      font-family: inherit;
    }

    .filter-btn:hover { border-color: #555; color: var(--text); }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(224,64,251,0.08); }

    /* ── メイン ── */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .result-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .result-meta span { color: var(--text); font-weight: 700; }

    /* ── イベントカード ── */
    .event-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .event-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }

    .event-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
    }

    .event-card:hover {
      border-color: #3a3a3a;
      transform: translateY(-1px);
    }

    .event-card.hidden { display: none; }

    .card-body {
      padding: 18px 20px 0 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
    }

    .genre-tag {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 1.5px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .genre-jpop    { background: rgba(224,64,251,0.15); color: var(--accent); border: 1px solid rgba(224,64,251,0.3); }
    .genre-rock    { background: rgba(255,82,82,0.15);  color: var(--red);    border: 1px solid rgba(255,82,82,0.3); }
    .genre-hiphop  { background: rgba(255,171,64,0.15); color: var(--orange); border: 1px solid rgba(255,171,64,0.3); }
    .genre-kpop    { background: rgba(0,229,255,0.12);  color: var(--accent2);border: 1px solid rgba(0,229,255,0.25); }
    .genre-anime   { background: rgba(105,240,174,0.12);color: var(--green);  border: 1px solid rgba(105,240,174,0.25); }
    .genre-idol    { background: rgba(255,128,171,0.15);color: #ff80ab;       border: 1px solid rgba(255,128,171,0.3); }
    .genre-youtuber{ background: rgba(255,0,0,0.12);    color: #ff4444;       border: 1px solid rgba(255,0,0,0.3); }
    .genre-vtuber  { background: rgba(149,117,205,0.18);color: #ce93d8;       border: 1px solid rgba(149,117,205,0.35); }
    .genre-classic { background: rgba(212,175,55,0.15); color: #d4af37;       border: 1px solid rgba(212,175,55,0.35); }
    .genre-fes        { background: rgba(0,200,100,0.15);  color: #00c864;       border: 1px solid rgba(0,200,100,0.3); }
    .genre-kids       { background: rgba(255,200,0,0.15);  color: #ffcc00;       border: 1px solid rgba(255,200,0,0.3); }
    .genre-baseball   { background: rgba(0,60,180,0.15);   color: #6699ff;       border: 1px solid rgba(0,60,180,0.3); }
    .genre-soccer     { background: rgba(0,160,60,0.15);   color: #33dd77;       border: 1px solid rgba(0,160,60,0.3); }
    .genre-basketball { background: rgba(255,110,0,0.15);  color: #ff9933;       border: 1px solid rgba(255,110,0,0.3); }
    .genre-volleyball { background: rgba(0,180,220,0.15);  color: #44ccff;       border: 1px solid rgba(0,180,220,0.3); }

    .event-artist {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .event-name {
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .event-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }

    .event-meta-item {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── チケットセクション ── */
    .ticket-section {
      border-top: 1px solid var(--border);
      margin-top: 14px;
      padding: 14px 20px 16px 24px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ticket-item {
      flex: 1;
      min-width: 140px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      transition: border-color 0.2s;
    }

    .ticket-item.status-urgent { border-color: rgba(255,82,82,0.4); }
    .ticket-item.status-soon   { border-color: rgba(255,171,64,0.35); }
    .ticket-item.status-normal { border-color: rgba(0,229,255,0.25); }
    .ticket-item.status-passed { opacity: 0.45; }

    .ticket-type {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ticket-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-urgent .ticket-dot { background: var(--red);    box-shadow: 0 0 5px var(--red); }
    .status-soon   .ticket-dot { background: var(--orange); box-shadow: 0 0 5px var(--orange); }
    .status-normal .ticket-dot { background: var(--accent2);}
    .status-passed .ticket-dot { background: var(--text-muted); }

    .ticket-date {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .status-urgent .ticket-date { color: var(--red); }
    .status-soon   .ticket-date { color: var(--orange); }
    .status-normal .ticket-date { color: var(--accent2); }
    .status-passed .ticket-date { color: var(--text-muted); text-decoration: line-through; }

    .ticket-countdown {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 7px;
      border-radius: 4px;
      display: inline-block;
      width: fit-content;
      text-decoration: none;
      cursor: default;
    }

    a.ticket-countdown {
      cursor: pointer;
    }

    a.ticket-countdown:hover {
      opacity: 0.75;
      text-decoration: underline;
    }

    .status-urgent .ticket-countdown { background: rgba(255,82,82,0.15);    color: var(--red); }
    .status-soon   .ticket-countdown { background: rgba(255,171,64,0.15);   color: var(--orange); }
    .status-normal .ticket-countdown { background: rgba(0,229,255,0.1);     color: var(--accent2); }
    .status-passed .ticket-countdown { background: transparent; color: var(--text-muted); }

    /* ── チケット価格 & リンクボタン ── */
    .card-footer {
      padding: 10px 20px 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ticket-price {
      font-size: 15px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ticket-price-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 1px;
    }

    .ticket-price-tbd {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
    }

    .ticket-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ticket-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .ticket-link-btn:hover { opacity: 0.8; transform: translateY(-1px); }

    .btn-lawson {
      background: rgba(0, 120, 215, 0.15);
      color: #4db6ff;
      border: 1px solid rgba(0, 120, 215, 0.35);
    }

    .btn-pia {
      background: rgba(255, 80, 80, 0.12);
      color: #ff8a80;
      border: 1px solid rgba(255, 80, 80, 0.3);
    }

    .btn-eplus {
      background: rgba(0, 200, 130, 0.12);
      color: #69f0ae;
      border: 1px solid rgba(0, 200, 130, 0.3);
    }

    .btn-shochiku {
      background: rgba(180, 120, 60, 0.15);
      color: #f0c070;
      border: 1px solid rgba(180, 120, 60, 0.35);
    }

    .btn-amazon {
      background: rgba(255, 153, 0, 0.15);
      color: #ffb84d;
      border: 1px solid rgba(255, 153, 0, 0.35);
    }

    .btn-hotel {
      background: rgba(0, 180, 120, 0.12);
      color: #4dd8a0;
      border: 1px solid rgba(0, 180, 120, 0.3);
    }

    .btn-rakuten {
      background: rgba(191, 0, 0, 0.12);
      color: #ff6666;
      border: 1px solid rgba(191, 0, 0, 0.3);
    }

    .btn-official {
      background: rgba(100, 200, 255, 0.12);
      color: #80d8ff;
      border: 1px solid rgba(100, 200, 255, 0.3);
    }

    /* ── 空状態 ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--text-muted);
    }

    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; letter-spacing: 0.5px; }

    /* ── フッター ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 1px;
      margin-top: 32px;
    }
  #pagetop {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.2s;
  }
  #pagetop.visible { display: flex; }

  @media (max-width: 600px) {
    header {
      padding: 0 16px;
      height: 56px;
    }
    .logo { font-size: 18px; letter-spacing: 2px; }
    .logo img { height: 36px; }
    nav { gap: 14px; }
    nav a { font-size: 13px; }

    .hero { padding: 36px 16px 28px; }

    .controls { padding: 12px 16px; }
    .search-wrap { max-width: 100%; }

    main { padding: 20px 16px; }

    .card-body {
      grid-template-columns: 1fr;
      padding: 14px 16px 0 18px;
    }

    .event-name { font-size: 15px; }

    .ticket-section {
      padding: 12px 16px 14px 18px;
      flex-direction: column;
    }

    .ticket-item { min-width: 0; width: 100%; }

    .card-footer {
      padding: 10px 16px 14px 18px;
      flex-direction: column;
      align-items: flex-start;
    }

    .ticket-links { flex-wrap: wrap; }
  }
  </style>
</head>

<header>
  <a href="index.html" class="logo" style="text-decoration:none;"><img src="logo.png" alt="OSHINAVI logo">OSHINAVI</a>

<div class="hero">

  <!-- ジャンルフィルター -->
  <div class="filter-row">

    <button class="filter-btn active" data-genre="all">すべて</button>

    <button class="filter-btn" data-genre="kpop">K-POP</button>

    <button class="filter-btn" data-genre="anime">アニソン</button>

    <button class="filter-btn" data-genre="youtuber">YouTuber</button>
    <button class="filter-btn" data-genre="vtuber">VTuber</button>

    <button class="filter-btn" data-genre="sports">スポーツ</button>
    <button class="filter-btn" data-genre="fes">フェス</button>

  <!-- ステータスフィルター -->
  <div class="filter-row">
    <span class="filter-label">STATUS</span>

</div>

<main>
  <div class="result-meta">
    <span id="resultCount">0</span> 件のイベント
  </div>

  <div class="event-list" id="eventList">
    <!-- JS で描画 -->
  </div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">🔎</div>

<footer>
  &copy; 2025 OSHINAVI — ライブイベント情報まとめ
</footer>

<button id="pagetop" title="トップへ戻る">↑</button>

  // ────────────────────────────────────────────────
  //  ユーティリティ
  // ────────────────────────────────────────────────
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  function parseDateStr(str) {
    const [y, m, d] = str.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function daysFrom(dateStr) {
    const d = parseDateStr(dateStr);
    return Math.round((d - today) / 86400000);
  }

  function getTicketStatus(dateStr) {
    const diff = daysFrom(dateStr);
    if (diff < 0)  return "passed";
    if (diff <= 7) return "urgent";
    if (diff <= 31) return "soon";
    return "normal";
  }

  function countdownLabel(dateStr) {
    const diff = daysFrom(dateStr);
    if (diff < 0)  return "終了";
    if (diff === 0) return "本日";
    if (diff === 1) return "明日";
    return `あと ${diff} 日`;
  }

  function formatDate(dateStr) {
    const d = parseDateStr(dateStr);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  }

  function renderCard(ev) {
    const ticketsHTML = ev.tickets.map(t => {
      const status = getTicketStatus(t.date);
      const label  = countdownLabel(t.date);
      const countdown = ev.links && ev.links.pia
        ? `<a class="ticket-countdown" href="${ev.links.pia}" target="_blank" rel="noopener">${label}</a>`
        : `<div class="ticket-countdown">${label}</div>`;
      return `
        <div class="ticket-item status-${status}">
          <div class="ticket-type">
            <span class="ticket-dot"></span>
            ${t.type}
          </div>
          <div class="ticket-date">${formatDate(t.date)}</div>
          ${countdown}
        </div>`;
    }).join("");

    // イベント全体の緊急度（最も近い未来チケット基準）
    const upcoming = ev.tickets
      .map(t => ({ status: getTicketStatus(t.date), diff: daysFrom(t.date) }))
      .filter(t => t.diff >= 0)
      .sort((a, b) => a.diff - b.diff)[0];

    const cardStatus = upcoming
      ? (upcoming.diff <= 7 ? "urgent" : upcoming.diff <= 31 ? "soon" : "normal")
      : "passed";

    const priceHTML = ev.price
      ? `<div class="ticket-price"><span class="ticket-price-label">チケット料金</span>${ev.price}</div>`
      : "";

    const linkDefs = [
      { key: "lawson",   label: "ローソンチケット", cls: "btn-lawson",   icon: "🎫" },

      { key: "amazon",   label: "最新CD",            cls: "btn-amazon",   icon: "🛒" },
      { key: "amazonGoods", label: "グッズAmazon",   cls: "btn-amazon",   icon: "🛒" },
      { key: "amazon2",  label: "最新CD②",          cls: "btn-amazon",   icon: "🛒" },
      { key: "rakuten",  label: "楽天チケット",       cls: "btn-rakuten",  icon: "🎫" },
      { key: "official", label: "公式チケット",        cls: "btn-official", icon: "🎟" },
    ];
    const hotelBtn = `<a class="ticket-link-btn btn-hotel" href="https://click.linksynergy.com/fs-bin/click?id=z9x6HLNpWco&offerid=1674601.8&type=3&subid=0" target="_blank" rel="noopener">🏨 会場近くのホテルを探す</a>`;
    const linksHTML = linkDefs
      .filter(d => ev.links && ev.links[d.key])
      .map(d => `<a class="ticket-link-btn ${d.cls}" href="${ev.links[d.key]}" target="_blank" rel="noopener">${d.icon} ${d.label}</a>`)
      .join("") + hotelBtn;

    return `
      <div class="event-card"
           data-id="${ev.id}"
           data-genre="${ev.genre}"
           data-status="${cardStatus}"
           data-prefecture="${ev.prefecture || ''}"
           data-search="${(ev.artist + " " + ev.name).toLowerCase()}">
        <div class="card-body">
          <div class="event-info">
            <span class="genre-tag genre-${ev.genre}">${GENRE_LABEL[ev.genre]}</span>
            <div class="event-artist">${ev.artist}</div>
            <div class="event-name">${ev.name}</div>
            <div class="event-meta">
              <span class="event-meta-item">📅 ${ev.dateLabel}</span>
              <span class="event-meta-item">📍 ${ev.venue}</span>
            </div>
          </div>
        </div>
        <div class="ticket-section">${ticketsHTML}</div>
        <div class="card-footer">
          ${priceHTML}
          <div class="ticket-links">${linksHTML || '<span style="font-size:12px;color:var(--text-muted)">購入リンク未設定</span>'}</div>
        </div>
      </div>`;
  }

  // ────────────────────────────────────────────────
  //  フィルタリング
  // ────────────────────────────────────────────────
  let activeGenre  = "all";
  let activeStatus = "all";
  let activeRegion = "all";
  let searchQuery  = "";

  function applyFilters() {
    const cards = document.querySelectorAll(".event-card");
    let visible = 0;

    cards.forEach(card => {
      const genre      = card.dataset.genre;
      const status     = card.dataset.status;
      const search     = card.dataset.search;
      const prefecture = card.dataset.prefecture;

      const matchGenre  = activeGenre  === "all" || genre === activeGenre || (activeGenre === "engeki" && (genre === "2.5ji" || genre === "seiyuu")) || (activeGenre === "anime" && genre === "seiyuu");
      const matchStatus = activeStatus === "all"
        || (activeStatus === "urgent"   && status === "urgent")
        || (activeStatus === "soon"     && (status === "urgent" || status === "soon"))
        || (activeStatus === "upcoming" && status === "normal");
      const matchSearch = searchQuery === "" || search.includes(searchQuery.toLowerCase());
      const matchRegion = activeRegion === "all"
        || prefecture === "全国"
        || PREFECTURE_TO_REGION[prefecture] === activeRegion;

      if (matchGenre && matchStatus && matchSearch && matchRegion) {
        card.classList.remove("hidden");
        visible++;
      } else {
        card.classList.add("hidden");
      }
    });

    document.getElementById("resultCount").textContent = visible;
    document.getElementById("emptyState").style.display = visible === 0 ? "block" : "none";
  }

  // ────────────────────────────────────────────────
  //  初期化
  // ────────────────────────────────────────────────
  function init() {
    const list = document.getElementById("eventList");
    list.innerHTML = EVENTS.map(renderCard).join("");

    document.getElementById("resultCount").textContent = EVENTS.length;

    // ジャンルフィルター
    document.querySelectorAll(".filter-btn[data-genre]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn[data-genre]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeGenre = btn.dataset.genre;
        applyFilters();
      });
    });

    // ステータスフィルター
    document.querySelectorAll(".filter-btn[data-status]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn[data-status]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeStatus = btn.dataset.status;
        applyFilters();
      });
    });

    // 地方フィルター
    document.querySelectorAll("[data-region]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("[data-region]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        activeRegion = btn.dataset.region;
        applyFilters();
      });
    });

    // 検索 & サジェスト
    const searchInput = document.getElementById("searchInput");
    const suggest = document.getElementById("searchSuggest");

    const allLabels = [...new Set(EVENTS.map(ev => ev.artist))];

    function showSuggest(query) {
      if (!query) { suggest.classList.remove("open"); return; }
      const q = query.toLowerCase();
      const matches = allLabels.filter(label => label.toLowerCase().includes(q)).slice(0, 10);
      if (matches.length === 0) { suggest.classList.remove("open"); return; }
      suggest.innerHTML = matches.map(label =>
        `<div class="suggest-item">${label}</div>`
      ).join("");
      suggest.classList.add("open");
      suggest.querySelectorAll(".suggest-item").forEach(item => {
        item.addEventListener("mousedown", () => {
          searchInput.value = item.textContent;
          searchQuery = item.textContent.trim();
          applyFilters();
          suggest.classList.remove("open");
        });
      });
    }

    searchInput.addEventListener("input", e => {
      searchQuery = e.target.value.trim();
      applyFilters();
      showSuggest(searchQuery);
    });

    searchInput.addEventListener("blur", () => {
      setTimeout(() => suggest.classList.remove("open"), 150);
    });
  }

  init();

  const pagetop = document.getElementById("pagetop");
  window.addEventListener("scroll", () => {
    pagetop.classList.toggle("visible", window.scrollY > 300);
  });
  pagetop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
</script>
