<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - OSHINAVI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #e040fb;
      --accent2: #00e5ff;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --text: #f0f0f0;
      --text-muted: #888;
      --border: #2a2a2a;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    nav { display: flex; gap: 24px; }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }
    nav a.active { color: var(--accent); }

    .hero {
      text-align: center;
      padding: 56px 24px 40px;
      border-bottom: 1px solid var(--border);
      background: radial-gradient(ellipse at 50% 0%, rgba(224,64,251,0.08) 0%, transparent 70%);
    }

    .hero h1 {
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .hero h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .container {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }

    .form-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
    }

    /* HubSpotフォームのスタイル上書き */
    .hs-form-frame {
      color-scheme: dark;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">OSHINAVI</a>
  <nav>
    <a href="index.html">チケットイベント</a>
    <a href="contact.html" class="active">お問い合わせ</a>
  </nav>
</header>

<div class="hero">
  <h1><span>お問い合わせ</span></h1>
  <p>ご意見・情報提供・掲載依頼などはこちらからどうぞ</p>
</div>

<div class="container">
  <div class="form-wrap">
    <script src="https://js-na2.hsforms.net/forms/embed/245720396.js" defer></script>
    <div class="hs-form-frame" data-region="na2" data-form-id="626a7b21-ff33-4dca-b3f8-a56672ea0a88" data-portal-id="245720396"></div>
  </div>
</div>

</body>
</html>
