<svg xmlns="http://www.w3.org/2000/svg" width="400" height="140" viewBox="0 0 400 140">
  <defs>
    <linearGradient id="ticketGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0a1e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e040fb"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
    <mask id="ticketMask">
      <rect width="400" height="140" fill="white" rx="12"/>
      <circle cx="0" cy="70" r="14" fill="black"/>
      <circle cx="400" cy="70" r="14" fill="black"/>
    </mask>
  </defs>

  <!-- チケット本体 -->
  <rect width="400" height="140" fill="url(#ticketGrad)" rx="12" mask="url(#ticketMask)"/>

  <!-- ミシン目ライン -->
  <line x1="310" y1="18" x2="310" y2="122" stroke="#333" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- アクセントライン上下 -->
  <rect x="0" y="0" width="400" height="4" fill="url(#accentGrad)" rx="2" mask="url(#ticketMask)"/>
  <rect x="0" y="136" width="400" height="4" fill="url(#accentGrad)" rx="2" mask="url(#ticketMask)"/>

  <!-- OSHINAVI テキスト -->
  <text x="148" y="88" font-family="'Arial Black', 'Impact', sans-serif" font-size="52" font-weight="900" text-anchor="middle" letter-spacing="3">
    <tspan fill="url(#accentGrad)">OSHI</tspan><tspan fill="#f0f0f0">NAVI</tspan>
  </text>

  <!-- チケット右側スタブ -->
  <text x="340" y="62" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle" letter-spacing="1">TICKET</text>
  <text x="340" y="80" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle" letter-spacing="1">LIVE</text>
  <text x="340" y="98" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle" letter-spacing="1">INFO</text>
</svg>
