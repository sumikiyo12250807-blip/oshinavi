<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>メンテナンス中 | OSHINAVI</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: #f7f7f9;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .card {
    background: #fff;
    max-width: 520px;
    width: 100%;
    padding: 40px 32px;
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    text-align: center;
  }
  .logo {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #e85a71;
    margin: 0 0 20px;
  }
  h1 {
    font-size: 1.25rem;
    color: #222;
    margin: 0 0 18px;
    line-height: 1.5;
  }
  p {
    color: #555;
    line-height: 1.9;
    margin: 0 0 10px;
    font-size: 0.95rem;
  }
  .note {
    margin-top: 28px;
    font-size: 0.85rem;
    color: #888;
  }
</style>
</head>
<body>
  <div class="card">
    <p class="logo">OSHINAVI</p>
    <h1>ただいまメンテナンス中です</h1>
    <p>サイト全体の情報を整備しております。</p>
    <p>ご不便をおかけしますが、しばらくお待ちください。</p>
    <p class="note">Under Maintenance</p>
  </div>
</body>
</html>
