<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSHINAVI - メンテナンス中</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #1f2937;
  padding: 20px;
}
.container {
  background: white;
  border-radius: 24px;
  padding: 48px 32px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.1);
}
h1 {
  font-size: 28px;
  margin-bottom: 16px;
  color: #92400e;
}
.icon {
  font-size: 64px;
  margin-bottom: 24px;
}
p {
  font-size: 15px;
  line-height: 1.8;
  color: #4b5563;
  margin-bottom: 16px;
}
.note {
  background: #fef3c7;
  border-left: 4px solid #f59e0b;
  padding: 16px;
  border-radius: 8px;
  margin-top: 24px;
  text-align: left;
  font-size: 13px;
  color: #92400e;
  line-height: 1.7;
}
</style>
</head>
<body>
<div class="container">
<div class="icon">🔧</div>
<h1>メンテナンス中</h1>
<p>OSHINAVIをご利用いただきありがとうございます。</p>
<p>現在、掲載情報の精度向上のためデータ点検作業を行っております。</p>
<p>ご不便をおかけして申し訳ございません。</p>
<div class="note">
チケット販売終了日の表示について再確認作業を実施中です。<br>
復旧まで今しばらくお待ちください。
</div>
</div>
</body>
</html>
